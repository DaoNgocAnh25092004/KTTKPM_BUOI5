services:
  food-service:
    build:
      context: ./food-service
      dockerfile: Dockerfile
    container_name: food-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/foods"]
      interval: 15s
      timeout: 5s
      retries: 3
