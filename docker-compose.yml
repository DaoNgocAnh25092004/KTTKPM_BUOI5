# ==============================================================
# Docker Compose — Mini Food Ordering System (Backend Only)
# Máy chủ: chạy docker-compose up -d
# Frontend: chạy trên máy khác, trỏ IP về máy này
# ==============================================================

services:
  # ────────────────────────────────────
  # User Service  →  port 8081
  # ────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - food-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/users"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────
  # Food Service  →  chạy trên máy 192.168.1.103:8082 (external)
  # ────────────────────────────────────

  # ────────────────────────────────────
  # Order Service  →  port 8083
  # Gọi nội bộ Food + User qua tên container
  # ────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - FOOD_SERVICE_URL=http://192.168.1.103:8082
      - USER_SERVICE_URL=http://user-service:8081
    depends_on:
      - user-service
    networks:
      - food-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/orders"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ────────────────────────────────────
  # Payment Service  →  port 8084
  # Gọi nội bộ Order qua tên container
  # ────────────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - ORDER_SERVICE_URL=http://order-service:8083
    depends_on:
      - order-service
    networks:
      - food-network

# ==============================================================
# Internal Docker network (các container gọi nhau qua hostname)
# ==============================================================
networks:
  food-network:
    driver: bridge
